{% extends "base/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<h2>Customers Map</h2>

<div id="map" style="height:600px;border-radius:10px;"></div>

<script>

let map = L.map('map').setView([23.6850, 90.3563], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


let customers = [

{% for c in customers %}

{
name: "{{ c.name|escapejs }}",
phone: "{{ c.phone|escapejs }}",
lat: {{ c.latitude }},
lng: {{ c.longitude }}
},

{% endfor %}

];


customers.forEach(c => {

let marker = L.marker([c.lat, c.lng]).addTo(map);

marker.bindPopup(
"<b>"+c.name+"</b><br>"+c.phone+
"<br><a target='_blank' href='https://maps.google.com/?q="+c.lat+","+c.lng+"'>Navigate</a>"
);

});

</script>

{% endblock %}
