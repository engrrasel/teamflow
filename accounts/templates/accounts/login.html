{% load static %}

<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="{% static 'accounts/auth.css' %}?v=1">

</head>

<body>

<div class="auth-box">

<h2>Login</h2>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">Login</button>

</form>

<div class="auth-links">

<a href="{% url 'password_reset' %}">Forgot password?</a><br>

<a href="{% url 'signup' %}">Create new account</a>

</div>

</div>

</body>
</html>
