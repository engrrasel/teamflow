{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Reset</title>

<link rel="stylesheet" href="{% static 'accounts/auth.css' %}?v=1">

</head>

<body>

<div class="auth-box">

<h2>Reset Password</h2>

<form method="post">

{% csrf_token %}

<div class="form-field">
{{ form.email.label_tag }}
{{ form.email }}
</div>

<button type="submit">
Send Reset Link
</button>

</form>

<div class="auth-links">

<a href="{% url 'login' %}">Back to login</a>

</div>

</div>

</body>
</html>
