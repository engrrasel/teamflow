{% extends "base/base.html" %}
{% load static %}

{% block extra_css %}

<link rel="stylesheet" href="{% static 'company/css/designation.css' %}">
{% endblock %}

{% block title %}Add Designation{% endblock %}

{% block content %}

<div class="designation-page">

<div class="emp-card">

<div class="emp-header">
<h2>Add New Designation</h2>
</div>

<form method="post" class="designation-form">
{% csrf_token %}

<div class="form-group">
<label>Group</label>
{{ form.group }}
</div>

<div class="form-group">
<label>Designation Name</label>
{{ form.name }}
</div>

<div class="form-actions">
<button type="submit" class="add-btn">
Save Designation
</button>
</div>

</form>

<div class="back-link">
<a href="{% url 'designation_list' %}">← Back to list</a>
</div>

</div>

</div>

{% endblock %}
