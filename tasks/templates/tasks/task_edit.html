{% extends "base/base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'tasks/css/task_edit.css' %}">
{% endblock %}

{% block content %}

<div class="task-header">
<h2>Edit Task</h2>
</div>

<div class="emp-card">

<form method="post" class="task-form">

{% csrf_token %}

<!-- TASK TITLE -->

<div class="full">
<label>Task Title</label>

<input type="text"
name="title"
value="{{ assignment.title_override|default:task.title }}"
required>

</div>


<!-- TASK TYPE -->

<div>
<label>Task Type</label>

<select name="task_type">

<option value="desk"
{% if assignment.task_type_override %}
    {% if assignment.task_type_override == "desk" %}selected{% endif %}
{% else %}
    {% if task.task_type == "desk" %}selected{% endif %}
{% endif %}>
Desk Work
</option>


<option value="visit"
{% if assignment.task_type_override %}
    {% if assignment.task_type_override == "visit" %}selected{% endif %}
{% else %}
    {% if task.task_type == "visit" %}selected{% endif %}
{% endif %}>
Visit
</option>


<option value="call"
{% if assignment.task_type_override %}
    {% if assignment.task_type_override == "call" %}selected{% endif %}
{% else %}
    {% if task.task_type == "call" %}selected{% endif %}
{% endif %}>
Call
</option>


<option value="meeting"
{% if assignment.task_type_override %}
    {% if assignment.task_type_override == "meeting" %}selected{% endif %}
{% else %}
    {% if task.task_type == "meeting" %}selected{% endif %}
{% endif %}>
Meeting
</option>


<option value="collection"
{% if assignment.task_type_override %}
    {% if assignment.task_type_override == "collection" %}selected{% endif %}
{% else %}
    {% if task.task_type == "collection" %}selected{% endif %}
{% endif %}>
Collection
</option>

</select>

</div>


<!-- PRIORITY -->

<div>
<label>Priority</label>

<select name="priority">

<option value="low"
{% if assignment.priority_override %}
    {% if assignment.priority_override == "low" %}selected{% endif %}
{% else %}
    {% if task.priority == "low" %}selected{% endif %}
{% endif %}>
Low
</option>


<option value="medium"
{% if assignment.priority_override %}
    {% if assignment.priority_override == "medium" %}selected{% endif %}
{% else %}
    {% if task.priority == "medium" %}selected{% endif %}
{% endif %}>
Medium
</option>


<option value="high"
{% if assignment.priority_override %}
    {% if assignment.priority_override == "high" %}selected{% endif %}
{% else %}
    {% if task.priority == "high" %}selected{% endif %}
{% endif %}>
High
</option>

</select>

</div>


<!-- DEADLINE -->

<div>
<label>Deadline</label>

<input type="date"
name="due_date"
value="{% if assignment.due_date_override %}
{{ assignment.due_date_override|date:'Y-m-d' }}
{% else %}
{{ task.due_date|date:'Y-m-d' }}
{% endif %}">

</div>


<!-- CUSTOM POINTS -->

<div>
<label>Custom Points</label>

<input type="number"
name="custom_points"
step="0.1"
min="0"
value="{{ assignment.custom_points|default:'' }}"
placeholder="Leave empty for auto points">

</div>


<!-- DESCRIPTION -->

<div class="full">

<label>Description</label>

<textarea name="description"
placeholder="Task description...">{{ assignment.description_override|default:task.description }}</textarea>

</div>


<!-- BUTTONS -->

<div class="full">

<button type="submit" class="btn btn-primary">
Update Task
</button>

<a href="{% url 'task_list' %}" class="btn btn-danger">
Cancel
</a>

</div>

</form>

</div>

{% endblock %}
